name: Agent Review

on:
  pull_request:
    branches: ["*"]
  workflow_dispatch:
    inputs:
      profile:
        description: "Policy profile: appstore or tweak"
        required: false
        default: "appstore"

jobs:
  agent-review:
    runs-on: ubuntu-latest
    env:
      AGENT_PROFILE: ${{ github.event.inputs.profile || 'appstore' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run agent checks
        run: |
          chmod +x scripts/agents/ci_review.sh
          bash scripts/agents/ci_review.sh "${AGENT_PROFILE}"
